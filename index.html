<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#03040a" />
    <meta name="description" content="Solar Explorer — An interactive journey through our solar system. Explore planets, discover facts, and navigate the cosmos." />
    <title>Solar Explorer</title>

    <!-- Preconnect to font CDN to eliminate DNS + TCP + TLS latency -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Load Montserrat via <link> NOT @import — avoids render-blocking CSS parse -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;600;700;800&display=swap"
    />

    <!-- Pre-resolve DNS for planet texture CDN so image fetches start faster -->
    <link rel="dns-prefetch" href="https://www.solarsystemscope.com" />
    <link rel="preconnect" href="https://www.solarsystemscope.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
